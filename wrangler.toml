name = "nexus-mcp-cloud"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
MCP_SERVER_NAME = "nexus-mcp-cloud"

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "NexusMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NexusMCP"]

# Secrets set via: wrangler secret put SECRET_NAME
# NEXUS_AUTH_TOKEN, ANTHROPIC_API_KEY, XAI_API_KEY, XAI_API_KEY_2,
# OPENAI_API_KEY, GEMINI_API_KEY, DEEPSEEK_API_KEY, MISTRAL_API_KEY,
# GROQ_API_KEY, OPENROUTER_API_KEY, TELEGRAM_BOT_TOKEN,
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
# GITHUB_TOKEN, CLOUDFLARE_API_TOKEN, RUNPOD_API_KEY,
# XAI_MANAGEMENT_KEY, SLACK_WEBHOOK, SMTP_HOST, SMTP_USER, SMTP_PASSWORD
